services:
  gateway:
    build: .
    container_name: shamir-gateway
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: unless-stopped

  node-1:
    build: .
    container_name: shamir-node-1
    command: uvicorn src.adapters.vault:app --host 0.0.0.0 --port 8000
    env_file:
      - .env
    volumes:
      - ./bovedas_locales/nodo-1:/app/data   # <-- EL TÚNEL DE DATOS
    restart: unless-stopped

  node-2:
    build: .
